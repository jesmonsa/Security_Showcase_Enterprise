# ============================================================
# Secret Scanning Workflow — Gitleaks
# Escanea cada push y pull request buscando credenciales,
# API keys, tokens y datos sensibles hardcodeados.
# ============================================================
name: 🔐 Secret Scanning

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  schedule:
    # Escaneo completo cada lunes a las 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks — Detectar Secretos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historial completo para escanear todos los commits

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --verbose --redact

  terraform-validation:
    name: Terraform — Validar sin Credenciales
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que no existan .tfvars reales
        run: |
          echo "🔍 Buscando archivos .tfvars reales (no .example)..."
          # Buscar archivos .tfvars que NO sean .example
          FOUND=$(find . -name "*.tfvars" ! -name "*.example" 2>/dev/null | grep -v '.terraform')
          if [ -n "$FOUND" ]; then
            echo "❌ ERROR: Se encontraron archivos .tfvars reales:"
            echo "$FOUND"
            echo "Estos archivos pueden contener credenciales. Agrégarlos al .gitignore."
            exit 1
          else
            echo "✅ No se encontraron archivos .tfvars reales."
          fi

      - name: Verificar que no existan claves PEM/KEY
        run: |
          echo "🔍 Buscando archivos de clave privada..."
          FOUND=$(find . -name "*.pem" -o -name "*.key" -o -name "*oci_api_key*" 2>/dev/null)
          if [ -n "$FOUND" ]; then
            echo "❌ ERROR: Se encontraron archivos de clave privada:"
            echo "$FOUND"
            exit 1
          else
            echo "✅ No se encontraron claves privadas."
          fi

      - name: Verificar patrones de OCIDs hardcodeados en .tf
        run: |
          echo "🔍 Buscando OCIDs hardcodeados en archivos .tf..."
          # Buscar OCIDs reales (no variables, no ejemplos con xxxx)
          FOUND=$(grep -rn 'ocid1\.' --include="*.tf" . | grep -v 'var\.' | grep -v 'data\.' | grep -v '#' | grep -v 'xxxx' | grep -v 'REEMPLAZA' | grep -v 'example' || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️  ADVERTENCIA: Posibles OCIDs hardcodeados en archivos .tf:"
            echo "$FOUND"
            echo "Verifica que sean valores de ejemplo y no credenciales reales."
            # No falla el build, solo advierte
          else
            echo "✅ No se encontraron OCIDs hardcodeados en archivos .tf."
          fi

  oci-credentials-check:
    name: OCI — Verificar Exposición de Credenciales
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear patrones de credenciales OCI
        run: |
          echo "🔍 Escaneando patrones de credenciales OCI..."
          ERRORS=0

          # Verificar fingerprints reales (formato xx:xx:xx:xx)
          FINGERPRINTS=$(grep -rn '[0-9a-f]\{2\}:[0-9a-f]\{2\}:[0-9a-f]\{2\}:[0-9a-f]\{2\}:[0-9a-f]\{2\}' \
            --include="*.tf" --include="*.tfvars" --include="*.json" --include="*.yml" \
            --include="*.yaml" --include="*.sh" --include="*.ps1" . \
            | grep -v '.example' | grep -v 'xx:xx' | grep -v '#' || true)
          if [ -n "$FINGERPRINTS" ]; then
            echo "❌ Posibles fingerprints reales encontrados:"
            echo "$FINGERPRINTS"
            ERRORS=$((ERRORS+1))
          fi

          # Verificar contraseñas hardcodeadas comunes
          PASSWORDS=$(grep -rn 'db_password\s*=\s*"[^$]' \
            --include="*.tf" --include="*.tfvars" . \
            | grep -v '.example' | grep -v 'REEMPLAZA' | grep -v 'var\.' || true)
          if [ -n "$PASSWORDS" ]; then
            echo "❌ Posibles contraseñas hardcodeadas:"
            echo "$PASSWORDS" | sed 's/=.*/= [REDACTED]/'
            ERRORS=$((ERRORS+1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Se encontraron $ERRORS problema(s) de seguridad. Revisa los archivos antes de continuar."
            exit 1
          else
            echo "✅ No se encontraron credenciales expuestas."
          fi
