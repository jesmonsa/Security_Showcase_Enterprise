# ============================================================
# Terraform Lint & Security Scan — tfsec + checkov
# Analiza la infraestructura como código buscando
# configuraciones inseguras en archivos .tf
# ============================================================
name: 🏗️ Terraform Security Lint

on:
  push:
    branches: [ "**" ]
    paths:
      - '**.tf'
      - '**.tfvars.example'
  pull_request:
    branches: [ main ]
    paths:
      - '**.tf'
  workflow_dispatch:

jobs:
  tfsec:
    name: tfsec — Análisis de Seguridad IaC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true  # Reporta pero no falla el build
          github_token: ${{ secrets.GITHUB_TOKEN }}

  checkov:
    name: Checkov — Políticas de Seguridad Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: true
          output_format: github_failed_only
